<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Tech</title>
</head>
<body>
    <header>
        <h1>Arena Tech</h1>
    </header>
    <hr>
    <nav>
        <p>
        <a href="evento.html">Início</a> | 
        <a href="inscricao.html">Inscrição</a>
        </p>
    </nav>
    <main>
        <hr>
            <fieldset>
                <legend>Faça a inscrição para o evento aqui</legend>
                <form>
                    <label>Digite seu nome:</label>
                    <input type="text" placeholder="exemplo" required>
                    <br>
                    <hr>

                    <label>Digite seu e-mail:</label>
                    <input type="email" placeholder="exemplo@gmail.com" required>
                    <br>
                    <hr>

                    <label>Digite sua data de nascimento</label>
                    <input type="date">
                    <br>
                    <hr>

                    <label>Qual sera sua forma de participação?</label>
                    <br>
                    <input type="radio" name="formaDeParticipacao">
                    Presencial
                    <input type="radio" name="formaDeParticipacao">
                    Online
                    <br>
                    <hr>

                    <label>Qual sera sua atividade principal:</label>
                    <select>
                    <option>Mostra de Jogos</option>
                    <option>Desafios Games</option>
                    <option>Arena de Tecnologia</option>
                    <option>Palestras e Oficinas</option>
                    </select>
                    <br>
                    <hr>

                    <label>Marque o tipo da sua consulta:</label>
                    <br>
                    Programação
                    <input type="checkbox">
                    <br>
                    Jogos
                    <input type="checkbox">
                    <br>
                    Robótica
                    <input type="checkbox">
                    <br>
                    Design
                    <input type="checkbox">
                    <br>
                    <hr>

                    <label>Qual o seu nivel de expectativa para o evento?</label>
                    <input type="range" min="0" max="10">
                    <br>
                    <hr>

                    <label>Observações:</label>
                    <br>
                    <input type="textrea">
                    <br>
                    <hr>  
                    
                    
                    <input type="reset">

                    <button type="submit">Clique para enviar</button>
                </form>
            </fieldset>
        <br>
        <hr>
    </main>
    <footer>
        <h2><b>Arena Tech</b></h2>
        <p>Uberlândia - MG | contato@arenatech.com | Criado em 2026</p>
        <p>Conteúdo fictício criado para fins educacionais.</p>
        <p><b>&copy; 2026 Arena Tech</b></p>
    </footer>
</body>
</html>
